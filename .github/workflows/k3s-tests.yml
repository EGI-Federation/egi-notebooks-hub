
name: EGI Hub K3s Tests

permissions:
  contents: read

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  k3s-tests:
    runs-on: ubuntu-22.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Start local k3s cluster
        uses: jupyterhub/action-k3s-helm@v4
        with:
          k3s-channel: latest

      - name: Wait for cluster
        run: |
          echo "KUBECONFIG=$KUBECONFIG"
          kubectl get nodes
          kubectl wait --for=condition=Ready nodes --all --timeout=120s

      - name: Show cluster info
        run: |
          kubectl version
          kubectl get nodes -o wide
          kubectl get pods -A
          kubectl get storageclass

      - name: Check Kubernetes permissions
        run: |
          kubectl auth can-i create namespaces
          kubectl auth can-i delete namespaces
          kubectl auth can-i create secrets --all-namespaces
          kubectl auth can-i get secrets --all-namespaces
          kubectl auth can-i update secrets --all-namespaces
          kubectl auth can-i create persistentvolumeclaims --all-namespaces
          kubectl auth can-i list persistentvolumeclaims --all-namespaces
          kubectl auth can-i create pods --all-namespaces
          kubectl auth can-i get pods --all-namespaces
          kubectl auth can-i get pods/log --all-namespaces

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: |
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio kubernetes-asyncio
          pip install -e .

      - name: Run Phase 5 tests
        run: |
          source .venv/bin/activate
          python -m pytest             tests/phase5-k3s/test_spawner_k3s.py             tests/phase5-k3s/test_spawner_k3s_additional.py             tests/phase5-k3s/test_spawner_k3s_pods.py             tests/phase5-k3s/test_spawner_k3s_edge.py             -s

      - name: Show remaining Phase 5 namespaces
        if: always()
        run: |
          kubectl get ns | grep -E 'phase5|phase5-extra|phase5-pod|phase5-edge' || true

      - name: Show remaining Phase 5 Pods
        if: always()
        run: |
          kubectl get pods -A | grep -E 'phase5|phase5-extra|phase5-pod|phase5-edge' || true
